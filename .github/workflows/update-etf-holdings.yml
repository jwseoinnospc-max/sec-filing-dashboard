name: Update ETF Holdings

on:
  schedule:
    - cron: '0 1 * * 1'   # 매주 월요일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Scrape ETF holdings
        run: node scripts/scrape-etf-holdings.mjs

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf-holdings.json
          git diff --staged --quiet || git commit -m "data: ETF 구성종목 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
