<html lang="ko">
<head>

<title>🚀 INNOSPACE 한빛 발사 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; }
  #glcanvas { display: block; width: 100vw; height: 100vh; }

  .hud { position: fixed; color: #eaf2ff; text-shadow: 0 1px 3px rgba(0,0,0,.75); pointer-events: none; z-index: 10; }
  #stats { top: 14px; left: 14px; font-variant-numeric: tabular-nums; }
  #stats .big { font-size: 30px; font-weight: 700; letter-spacing: .5px; }

  #best .lbl { font-size: 11px; opacity: .65; letter-spacing: 1px; }
  #best .val { font-size: 18px; font-weight: 700; }

  #brand { top: 12px; left: 50%; transform: translateX(-50%); text-align: center; }
  #brand .co { font-size: 15px; font-weight: 800; letter-spacing: 3px; color: #6fd3ff; }
  #brand .veh { font-size: 12px; opacity: .8; margin-top: 1px; }

               background: rgba(111,211,255,.16); border: 1px solid rgba(111,211,255,.4); color: #bfe9ff; }

  #fuelwrap { bottom: 20px; left: 50%; transform: translateX(-50%); width: min(360px, 84vw); display:flex; flex-direction:column; gap:6px; }
  .frow { display:flex; align-items:center; gap:8px; font-size: 11px; }

  .fbar { height: 100%; width: 100%; border-radius: 6px; transition: width .08s linear; }

  .fbar2 { background: linear-gradient(90deg,#3ca0ff,#6fd3ff,#bfeaff); }

  #msg { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; width: 92%; }

  #touch { position: fixed; inset: 0; z-index: 9; display: none; }
  .tbtn { position: fixed; bottom: 60px; width: 76px; height: 76px; border-radius: 50%; background: rgba(255,255,255,.10); border: 2px solid rgba(255,255,255,.25); color:#fff; font-size: 26px; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color: transparent; text-align:center; line-height:1.05; }
  .tbtn:active { background: rgba(255,255,255,.30); }

  #tleft { left: 20px; } #tright { left: 108px; }
  #tthrust { right: 20px; width: 94px; height: 94px; bottom: 52px; font-size: 32px; background: rgba(255,120,60,.22); border-color: rgba(255,150,90,.5); }
  #tctx { right: 128px; width: 84px; height: 84px; bottom: 56px; font-size: 13px; font-weight:700; background: rgba(111,211,255,.20); border-color: rgba(111,211,255,.5); display:none; }
  #minimap { top: 74px; right: 14px; border-radius: 10px; }
  #hint { bottom: 6px; left: 0; right: 0; text-align:center; font-size: 12px; opacity:.5; }
  @media (hover: none) and (pointer: coarse) { #touch { display: block; } #hint{ display:none; } }
</style>

<body>
<canvas id="glcanvas"></canvas>

<div class="hud" id="brand">
  <div class="co">INNOSPACE</div>
  <div class="veh">한빛-나노 · HANBIT-Nano</div>

</div>

  <div class="frow" id="frow1"><span class="fl">1단</span><div class="ftrack"><div class="fbar fbar1" id="fbar1"></div></div><span class="fp" id="fp1">100%</span></div>
  <div class="frow" id="frow2"><span class="fl">2단</span><div class="ftrack"><div class="fbar fbar2" id="fbar2"></div></div><span class="fp" id="fp2">100%</span></div>
</div>

</div>
<div class="hud" id="hint">Space: 추진 · ←/→: 조종 · S: 단분리 · E: 위성배치 · R: 재시작</div>

<script>
"use strict";
/* ============================================================
   INNOSPACE 한빛-나노 발사 게임 — 순수 WebGL, 외부 의존성 없음
   2단 발사체 · 단분리 · 위성 궤도 투입
   ============================================================ */
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:20px">이 브라우저는 WebGL을 지원하지 않습니다.</p>'; throw new Error('no webgl'); }

/* ---------- mat4 / vec3 ---------- */
const M = {
  mul(a,b){ const o=new Float32Array(16); for(let c=0;c<4;c++)for(let r=0;r<4;r++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+r]*b[c*4+k];o[c*4+r]=s;} return o; },
  perspective(fovy,aspect,near,far){ const f=1/Math.tan(fovy/2),nf=1/(near-far),o=new Float32Array(16); o[0]=f/aspect;o[5]=f;o[10]=(far+near)*nf;o[11]=-1;o[14]=2*far*near*nf; return o; },
  lookAt(eye,ctr,up){ const z=norm(sub(eye,ctr)),x=norm(cross(up,z)),y=cross(z,x);
    return new Float32Array([x[0],y[0],z[0],0, x[1],y[1],z[1],0, x[2],y[2],z[2],0, -dot(x,eye),-dot(y,eye),-dot(z,eye),1]); },
  translation(x,y,z){ const o=ident(); o[12]=x;o[13]=y;o[14]=z; return o; },
  rotX(a){ const c=Math.cos(a),s=Math.sin(a),o=ident(); o[5]=c;o[6]=s;o[9]=-s;o[10]=c; return o; },
  rotY(a){ const c=Math.cos(a),s=Math.sin(a),o=ident(); o[0]=c;o[2]=-s;o[8]=s;o[10]=c; return o; },
  rotZ(a){ const c=Math.cos(a),s=Math.sin(a),o=ident(); o[0]=c;o[1]=s;o[4]=-s;o[5]=c; return o; },
};
function ident(){ const o=new Float32Array(16); o[0]=o[5]=o[10]=o[15]=1; return o; }
function sub(a,b){ return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]; }
function scaleV(a,s){ return [a[0]*s,a[1]*s,a[2]*s]; }
function dot(a,b){ return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function cross(a,b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function len(a){ return Math.hypot(a[0],a[1],a[2]); }
function norm(a){ const l=len(a)||1; return [a[0]/l,a[1]/l,a[2]/l]; }
function normalMat3(m){ return new Float32Array([m[0],m[1],m[2], m[4],m[5],m[6], m[8],m[9],m[10]]); }
function mix(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

/* ---------- 셰이더 ---------- */
function compile(t,src){ const s=gl.createShader(t); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
function program(vs,fs){ const p=gl.createProgram(); gl.attachShader(p,compile(gl.VERTEX_SHADER,vs)); gl.attachShader(p,compile(gl.FRAGMENT_SHADER,fs)); gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p)); return p; }

const litProg = program(`
  attribute vec3 aPos; attribute vec3 aNormal; attribute vec3 aColor;
  uniform mat4 uMVP; uniform mat3 uNMat; varying vec3 vColor; varying vec3 vN;
  void main(){ gl_Position=uMVP*vec4(aPos,1.0); vN=normalize(uNMat*aNormal); vColor=aColor; }`,`
  precision mediump float; varying vec3 vColor; varying vec3 vN; uniform vec3 uLight;
  void main(){ float d=max(dot(normalize(vN),normalize(uLight)),0.0); float l=0.32+0.68*d; gl_FragColor=vec4(vColor*l,1.0); }`);
const flatProg = program(`
  attribute vec3 aPos; attribute vec4 aColor; uniform mat4 uMVP; uniform float uSize; uniform float uPerspK; varying vec4 vColor;
  void main(){ gl_Position=uMVP*vec4(aPos,1.0); gl_PointSize = uPerspK>0.0 ? clamp(uSize*uPerspK/gl_Position.w, 2.0, 900.0) : uSize; vColor=aColor; }`,`
  precision mediump float; varying vec4 vColor; uniform float uRound;
  void main(){ if(uRound>0.5){ vec2 c=gl_PointCoord-vec2(0.5); float d=dot(c,c); if(d>0.25) discard; gl_FragColor=vec4(vColor.rgb, vColor.a*(1.0-d*3.2)); return; } gl_FragColor=vColor; }`);
const texProg = program(`
  attribute vec3 aPos; attribute vec2 aUV; uniform mat4 uMVP; varying vec2 vUV;
  void main(){ gl_Position=uMVP*vec4(aPos,1.0); vUV=aUV; }`,`
  precision mediump float; varying vec2 vUV; uniform sampler2D uTex;
  void main(){ vec4 c=texture2D(uTex,vUV); if(c.a<0.03) discard; gl_FragColor=c; }`);
const litU={ uMVP:gl.getUniformLocation(litProg,'uMVP'), uNMat:gl.getUniformLocation(litProg,'uNMat'), uLight:gl.getUniformLocation(litProg,'uLight'),
  aPos:gl.getAttribLocation(litProg,'aPos'), aNormal:gl.getAttribLocation(litProg,'aNormal'), aColor:gl.getAttribLocation(litProg,'aColor') };
const flatU={ uMVP:gl.getUniformLocation(flatProg,'uMVP'), uSize:gl.getUniformLocation(flatProg,'uSize'), uRound:gl.getUniformLocation(flatProg,'uRound'), uPerspK:gl.getUniformLocation(flatProg,'uPerspK'),
  aPos:gl.getAttribLocation(flatProg,'aPos'), aColor:gl.getAttribLocation(flatProg,'aColor') };
const texU={ uMVP:gl.getUniformLocation(texProg,'uMVP'), uTex:gl.getUniformLocation(texProg,'uTex'),
  aPos:gl.getAttribLocation(texProg,'aPos'), aUV:gl.getAttribLocation(texProg,'aUV') };

/* ---------- 지오메트리 빌더 ---------- */
function MeshBuilder(){
  const pos=[],nrm=[],col=[];
  const api={
    triN(a,na,b,nb,c,nc,color){ pos.push(a[0],a[1],a[2],b[0],b[1],b[2],c[0],c[1],c[2]); nrm.push(na[0],na[1],na[2],nb[0],nb[1],nb[2],nc[0],nc[1],nc[2]); for(let i=0;i<3;i++)col.push(color[0],color[1],color[2]); },
    triFlat(a,b,c,color){ const n=norm(cross(sub(b,a),sub(c,a))); api.triN(a,n,b,n,c,n,color); },
    quadFlat(a,b,c,d,color){ api.triFlat(a,b,c,color); api.triFlat(a,c,d,color); },
    cylinder(r,y0,y1,seg,color){ for(let i=0;i<seg;i++){ const t0=i/seg*6.2831853,t1=(i+1)/seg*6.2831853,c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1);
      const p00=[r*c0,y0,r*s0],p01=[r*c0,y1,r*s0],p10=[r*c1,y0,r*s1],p11=[r*c1,y1,r*s1],n0=[c0,0,s0],n1=[c1,0,s1];
      api.triN(p00,n0,p10,n1,p11,n1,color); api.triN(p00,n0,p11,n1,p01,n0,color); } },
    frustum(rB,rT,y0,y1,seg,color){ const dr=rT-rB,dy=y1-y0; for(let i=0;i<seg;i++){ const t0=i/seg*6.2831853,t1=(i+1)/seg*6.2831853,c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1);
      const pB0=[rB*c0,y0,rB*s0],pT0=[rT*c0,y1,rT*s0],pB1=[rB*c1,y0,rB*s1],pT1=[rT*c1,y1,rT*s1];
      const n0=norm([dy*c0,-dr,dy*s0]),n1=norm([dy*c1,-dr,dy*s1]);
      api.triN(pB0,n0,pB1,n1,pT1,n1,color); api.triN(pB0,n0,pT1,n1,pT0,n0,color); } },
    cone(rB,y0,y1,seg,color){ const h=y1-y0,hyp=Math.hypot(rB,h),slope=rB/hyp,ny=h/hyp;
      for(let i=0;i<seg;i++){ const t0=i/seg*6.2831853,t1=(i+1)/seg*6.2831853,tm=(t0+t1)/2,c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1),cm=Math.cos(tm),sm=Math.sin(tm);
        api.triN([rB*c0,y0,rB*s0],norm([slope*c0,ny,slope*s0]),[rB*c1,y0,rB*s1],norm([slope*c1,ny,slope*s1]),[0,y1,0],norm([slope*cm,ny,slope*sm]),color); } },
    box(cx,cy,cz,sx,sy,sz,color){ const x0=cx-sx/2,x1=cx+sx/2,y0=cy-sy/2,y1=cy+sy/2,z0=cz-sz/2,z1=cz+sz/2;
      const V=[[x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1],[x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]];
      api.quadFlat(V[4],V[5],V[6],V[7],color); api.quadFlat(V[3],V[2],V[1],V[0],color); api.quadFlat(V[0],V[1],V[5],V[4],color);
      api.quadFlat(V[2],V[3],V[7],V[6],color); api.quadFlat(V[1],V[2],V[6],V[5],color); api.quadFlat(V[3],V[0],V[4],V[7],color); },
    build(){ return { pos:new Float32Array(pos),nrm:new Float32Array(nrm),col:new Float32Array(col),count:pos.length/3 }; }
  };
  return api;
}
function makeGLMesh(data){ const b={pos:gl.createBuffer(),nrm:gl.createBuffer(),col:gl.createBuffer(),count:data.count};
  gl.bindBuffer(gl.ARRAY_BUFFER,b.pos); gl.bufferData(gl.ARRAY_BUFFER,data.pos,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,b.nrm); gl.bufferData(gl.ARRAY_BUFFER,data.nrm,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,b.col); gl.bufferData(gl.ARRAY_BUFFER,data.col,gl.STATIC_DRAW); return b; }
function drawLit(mesh,model){ const mvp=M.mul(pv,model); gl.useProgram(litProg);
  gl.uniformMatrix4fv(litU.uMVP,false,mvp); gl.uniformMatrix3fv(litU.uNMat,false,normalMat3(model)); gl.uniform3fv(litU.uLight,LIGHT);
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.pos); gl.enableVertexAttribArray(litU.aPos); gl.vertexAttribPointer(litU.aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.nrm); gl.enableVertexAttribArray(litU.aNormal); gl.vertexAttribPointer(litU.aNormal,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.col); gl.enableVertexAttribArray(litU.aColor); gl.vertexAttribPointer(litU.aColor,3,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLES,0,mesh.count); }

/* ---------- 색상 (INNOSPACE 한빛-나노 실물 참고) ---------- */
const WHITE=[0.90,0.91,0.94], NAVY=[0.09,0.15,0.34], CHAR=[0.11,0.12,0.16], DARK=[0.17,0.18,0.22],
      SILVER=[0.74,0.77,0.82], GOLD=[0.92,0.75,0.22], PANEL=[0.10,0.22,0.55],
      REDF=[0.80,0.15,0.18], BLUEF=[0.11,0.24,0.55];
const TAU=6.2831853;

/* 세로 스트라이프가 있는 실린더 (한쪽 면만 다른 색) */
function stripeCyl(mb,r,y0,y1,seg,base,stripe,center,half){
  for(let i=0;i<seg;i++){ const t0=i/seg*TAU,t1=(i+1)/seg*TAU,tm=(t0+t1)/2;
    const dd=Math.abs((((tm-center)%TAU)+TAU+Math.PI)%TAU-Math.PI);
    const col=dd<half?stripe:base;
    const c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1);
    const p00=[r*c0,y0,r*s0],p01=[r*c0,y1,r*s0],p10=[r*c1,y0,r*s1],p11=[r*c1,y1,r*s1],n0=[c0,0,s0],n1=[c1,0,s1];
    mb.triN(p00,n0,p10,n1,p11,n1,col); mb.triN(p00,n0,p11,n1,p01,n0,col); }
}

/* 둥근 돔형 노즈 (킥스테이지) — 곡면 프로파일 회전체 */
function domeGen(mb,r,y0,h,seg,rings,color){
  for(let i=0;i<rings;i++){ const t0=i/rings,t1=(i+1)/rings;
    const r0=r*Math.sqrt(Math.max(0,1-t0*t0)), r1=r*Math.sqrt(Math.max(0,1-t1*t1));
    mb.frustum(r0,r1, y0+t0*h, y0+t1*h, seg, color); }
}

/* ---------- 로켓 치수 (슬림한 2단 실루엣) ---------- */
const R1=1.15, H1=9.0, R2=0.90, H2=4.2, INTER=1.1, STACK=H1+INTER+0.3;

/* 1단: HyPER 엔진 + 흰 동체(세로 네이비 스트라이프) + 블랙 인터스테이지 */
const s1=MeshBuilder();
s1.frustum(R1*0.72,R1*0.46,-1.9,0.0,24,DARK);           // HyPER 엔진 노즐
s1.cone(R1,-0.2,-1.9,24,CHAR);                          // 엔진 하단 커버(어둡게)
stripeCyl(s1,R1,0.0,H1,30,WHITE,NAVY,0.0,1.15);         // 동체 + 우측 세로 네이비 스트라이프
s1.cylinder(R1*1.006,H1,H1+INTER,30,CHAR);              // 인터스테이지(블랙)
const stage1Mesh=makeGLMesh(s1.build());

/* 2단: LiMER 엔진 + 흰 동체(태극기) + 페이로드 어댑터 + 다크 페어링 */
const s2=MeshBuilder();
s2.frustum(R2*0.6,R2*0.4,-0.8,0.0,20,DARK);             // LiMER 엔진
s2.cylinder(R2,0.0,H2,26,WHITE);                        // 2단 동체
s2.box(0,H2*0.78,R2*0.99, 0.62,0.34,0.03, REDF);        // 태극기(홍)
s2.box(0,H2*0.78-0.33,R2*0.99, 0.62,0.34,0.03, BLUEF);  // 태극기(청)
s2.cylinder(R2*1.01,H2,H2+0.5,26,SILVER);              // 페이로드 어댑터(킥스테이지)
s2.cylinder(R2,H2+0.5,H2+1.0,26,CHAR);                 // 페어링 하단
domeGen(s2,R2,H2+1.0,2.3,26,12,CHAR);                  // 둥근 돔형 노즈(킥스테이지)
const stage2Mesh=makeGLMesh(s2.build());
const NOSE_TOP=H2+1.0+2.3;

/* 위성 (payload) */
const sat=MeshBuilder();
sat.box(0,0,0, 1.0,1.2,1.0, SILVER);
sat.box(0,0.1,0, 1.02,0.4,1.02, GOLD);
sat.box(-1.35,0,0, 1.7,0.06,1.0, PANEL);         // 태양전지판
sat.box(1.35,0,0, 1.7,0.06,1.0, PANEL);

function makeLogoTexture(){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=1024; const x=cv.getContext('2d');
  x.clearRect(0,0,256,1024);
  // 심볼: 파란 그라데이션의 서로 얽힌 렌즈 3개 (인피니티 체인)
  const g=x.createLinearGradient(40,0,216,0); g.addColorStop(0,'#123a6b'); g.addColorStop(1,'#2aa4e6');
  x.strokeStyle=g; x.lineWidth=17; x.lineCap='round'; x.lineJoin='round';
  const cy=140, w=44, h=52;
  function lens(cx){ x.beginPath(); x.moveTo(cx-w,cy); x.quadraticCurveTo(cx,cy-h,cx+w,cy); x.quadraticCurveTo(cx,cy+h,cx-w,cy); x.stroke(); }
  lens(84); lens(128); lens(172);
  // 세로 워드마크 "INNOSPACE" (INNO 네이비 · SPACE 블루)
  x.save(); x.translate(128,600); x.rotate(-Math.PI/2);
  x.textBaseline='middle'; x.font='900 116px Arial, "Malgun Gothic", sans-serif';
  const a='INNO', b='SPACE', wa=x.measureText(a).width, wb=x.measureText(b).width, tot=wa+wb;
  x.textAlign='left';
  x.fillStyle='#12386b'; x.fillText(a, -tot/2, 0);
  x.fillStyle='#1f9fe0'; x.fillText(b, -tot/2+wa, 0);
  x.restore();
  const tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,false);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,cv);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  return tex;
}

function buildDecal(r,y0,y1,center,half,segs){
  const pos=[],uv=[];
  for(let i=0;i<segs;i++){ const a0=center-half+2*half*i/segs, a1=center-half+2*half*(i+1)/segs;
    const c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1),u0=i/segs,u1=(i+1)/segs;
    const p00=[r*c0,y0,r*s0],p10=[r*c1,y0,r*s1],p11=[r*c1,y1,r*s1],p01=[r*c0,y1,r*s0];
    pos.push(...p00,...p10,...p11, ...p00,...p11,...p01);
    uv.push(u0,1, u1,1, u1,0, u0,1, u1,0, u0,0); }
  const b={pos:gl.createBuffer(),uv:gl.createBuffer(),count:pos.length/3};
  gl.bindBuffer(gl.ARRAY_BUFFER,b.pos); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pos),gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,b.uv); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(uv),gl.STATIC_DRAW);
  return b;
}

function up(){ return [-Math.sin(state.tilt), Math.cos(state.tilt), 0]; }

function separate(){ const s=state;
  if(!s.started || s.crashed || s.stage!==1 || s.jettison) return;
  const u=up();
  s.jettison={ pos:[s.pos[0],s.pos[1],s.pos[2]], vel:[s.vel[0]-u[0]*4,s.vel[1]-u[1]*4,s.vel[2]], angZ:s.tilt, angX:0, spinZ:(Math.random()-0.5)*3, spinX:(Math.random()-0.5)*4 };

function deploy(){ const s=state;

function update(dt){ const s=state; s.t+=dt;
  const left=keys.left||T.left, right=keys.right||T.right;
  const curFuel=s.stage===1?s.fuel1:s.fuel2;
  const wantThrust=(keys.thrust||T.thrust) && curFuel>0 && !s.crashed;
  if(hintTimer>0) hintTimer-=dt;
  for(const o of OBSTACLES) o.ang+=o.spin*dt;   // 방해물 회전

  if(s.started && !s.crashed){
    if(left)  s.tilt=clamp(s.tilt+1.6*dt,-MAX_TILT,MAX_TILT);
    if(right) s.tilt=clamp(s.tilt-1.6*dt,-MAX_TILT,MAX_TILT);
    if(!left && !right) s.tilt*=(1-Math.min(1,2.0*dt));

    const u=up(); const st=STG[s.stage];
    let ax=0, ay=-GRAV, az=0;
    if(wantThrust){ ax+=u[0]*st.thrust; ay+=u[1]*st.thrust; az+=u[2]*st.thrust;
      if(s.stage===1) s.fuel1=Math.max(0,s.fuel1-st.burn*dt); else s.fuel2=Math.max(0,s.fuel2-st.burn*dt);
      spawnExhaust(s,u,st.exOff,dt); }

    v[0]+=ax*dt; v[1]+=ay*dt; v[2]+=az*dt;
    s.pos[0]+=v[0]*dt; s.pos[1]+=v[1]*dt; s.pos[2]+=v[2]*dt;

    if(s.stage===1 && s.fuel1<=0 && s.started && s.t>0.5) separate();

    // 방해물 충돌 → 폭발 · 미션 실패

    if(!s.crashed && s.pos[1]<=1.0){ s.pos[1]=1.0; const impact=len(v);

  s.cam[0]=mix(s.cam[0],target[0],k); s.cam[1]=mix(s.cam[1],target[1],k); s.cam[2]=mix(s.cam[2],target[2],k);
}
function boom(s,n){ for(let i=0;i<n;i++) parts.push({p:[s.pos[0],s.pos[1]+2,s.pos[2]],v:[(Math.random()-0.5)*40,(Math.random()-0.2)*30,(Math.random()-0.5)*40],life:1.4,max:1.4,kind:'boom'}); }
function crash(s){ s.crashed=true; boom(s,70);
  showMsg('<h1>💥 발사 실패</h1><p>착지 속도가 너무 빨랐습니다<br>최고 고도 <b>'+fmtAlt(bestUnits)+'</b><br><br><span class="key">R</span> 로 재발사</p>'); }
function crashObstacle(s){ s.crashed=true; boom(s,90);

  j.vel[1]-=GRAV*dt; const dr=0.03; j.vel[0]*=(1-dr*dt); j.vel[2]*=(1-dr*dt);

  j.angZ+=j.spinZ*dt; j.angX+=j.spinX*dt;
  if(j.pos[1]<=1.0){ for(let i=0;i<24;i++) parts.push({p:[j.pos[0],1,j.pos[2]],v:[(Math.random()-0.5)*20,Math.random()*10,(Math.random()-0.5)*20],life:0.7,max:0.7,kind:'dust'}); state.jettison=null; } }
function updateSatellite(dt){ const st=state.satellite; if(!st)return;
  st.p[0]+=st.v[0]*dt; st.p[1]+=st.v[1]*dt; st.p[2]+=st.v[2]*dt; st.ang+=st.spin*dt;

function spawnExhaust(s,u,off,dt){ const nz=[s.pos[0]-u[0]*off,s.pos[1]-u[1]*off,s.pos[2]-u[2]*off];

  for(let i=0;i<n;i++){ if(parts.length>=MAXP)break;
    parts.push({p:[nz[0]+(Math.random()-0.5)*sp,nz[1],nz[2]+(Math.random()-0.5)*sp],
      v:[-u[0]*26+(Math.random()-0.5)*8,-u[1]*26+(Math.random()-0.5)*6,-u[2]*26+(Math.random()-0.5)*8],life:0.55,max:0.55,kind:'flame'}); } }
function updateParticles(dt){ for(let i=parts.length-1;i>=0;i--){ const q=parts[i]; q.life-=dt;
  if(q.life<=0){ parts.splice(i,1); continue; }
  q.p[0]+=q.v[0]*dt; q.p[1]+=q.v[1]*dt; q.p[2]+=q.v[2]*dt;
  if(q.kind==='boom'||q.kind==='dust') q.v[1]-=30*dt; } }

/* ---------- 렌더 ---------- */
const LIGHT=norm([0.4,0.9,0.35]); let pv, alt01Global=0;
function render(){ const s=state, alt01=clamp(s.pos[1]/SPACE_UNITS,0,1); alt01Global=alt01;
  const sky=[mix(0.40,0.02,alt01),mix(0.60,0.02,alt01),mix(0.85,0.06,alt01)];
  gl.clearColor(sky[0],sky[1],sky[2],1); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT); gl.enable(gl.DEPTH_TEST);
  const proj=M.perspective(Math.PI/3.2, canvas.width/canvas.height, 0.5, 6000);
  const view=M.lookAt(s.cam,[s.pos[0],s.pos[1]+4,s.pos[2]],[0,1,0]); pv=M.mul(proj,view);

  if(alt01>0.02) drawFlat(starBuf,gl.POINTS,2.0,1.0,alt01);
  gl.disable(gl.BLEND);
  drawLit(groundMesh,ident());
  drawFlat(gridBuf,gl.LINES,1.0,0.0,1.0-alt01*0.8);

  // 방해물
  for(const o of OBSTACLES){ if(o.y < s.pos[1]-120 || o.y > s.pos[1]+700) continue;
    const m=M.mul(M.mul(M.translation(o.x,o.y,o.z),M.rotY(o.ang)),M.rotZ(o.ang*0.7));
    drawLit(obstacleMesh,m); }

  let base=null;
  if(!s.crashed){
    base=M.mul(M.translation(s.pos[0],s.pos[1],s.pos[2]),M.rotZ(s.tilt));
    drawLit(stage2Mesh, s.stage===1 ? M.mul(base,M.translation(0,STACK,0)) : base);
    if(s.stage===1) drawLit(stage1Mesh, base);
  }
  let jm=null;
  if(s.jettison){ const j=s.jettison;
    jm=M.mul(M.mul(M.translation(j.pos[0],j.pos[1],j.pos[2]),M.rotZ(j.angZ)),M.rotX(j.angX));
    drawLit(stage1Mesh,jm); }
  if(s.satellite){ const st=s.satellite;
    const m=M.mul(M.mul(M.translation(st.p[0],st.p[1],st.p[2]),M.rotY(st.ang)),M.rotZ(st.ang*0.6));
    drawLit(satMesh,m); }

  // 로고 데칼 (1단 표면)
  if(base && s.stage===1) drawDecal(base);
  if(jm) drawDecal(jm);

  drawClouds();
  drawParticles();
}
function drawClouds(){ const cloudA=clamp(1.0-alt01Global*1.4,0,1); if(cloudA<=0.02) return;
  const focal=canvas.height*(1/Math.tan((Math.PI/3.2)/2))*0.5;
  gl.useProgram(flatProg); gl.uniformMatrix4fv(flatU.uMVP,false,pv);
  gl.uniform1f(flatU.uSize,3.6); gl.uniform1f(flatU.uRound,1.0); gl.uniform1f(flatU.uPerspK,focal);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA); gl.depthMask(false);
  gl.bindBuffer(gl.ARRAY_BUFFER,cloudBuf.pos); gl.enableVertexAttribArray(flatU.aPos); gl.vertexAttribPointer(flatU.aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,cloudBuf.col); gl.enableVertexAttribArray(flatU.aColor); gl.vertexAttribPointer(flatU.aColor,4,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.POINTS,0,cloudBuf.count);
  gl.depthMask(true); gl.disable(gl.BLEND); gl.uniform1f(flatU.uPerspK,0.0); }
function drawFlat(buf,mode,size,round,alphaMul){ gl.useProgram(flatProg);
  gl.uniformMatrix4fv(flatU.uMVP,false,pv); gl.uniform1f(flatU.uSize,size); gl.uniform1f(flatU.uRound,round); gl.uniform1f(flatU.uPerspK,0.0);
  if(alphaMul<1){ gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA); }
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.pos); gl.enableVertexAttribArray(flatU.aPos); gl.vertexAttribPointer(flatU.aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.col); gl.enableVertexAttribArray(flatU.aColor); gl.vertexAttribPointer(flatU.aColor,4,gl.FLOAT,false,0,0);
  gl.drawArrays(mode,0,buf.count); gl.disable(gl.BLEND); }
function drawParticles(){ const n=parts.length; if(!n)return;
  for(let i=0;i<n;i++){ const q=parts[i],t=q.life/q.max,o=i*3,o4=i*4; pPos[o]=q.p[0];pPos[o+1]=q.p[1];pPos[o+2]=q.p[2];
    if(q.kind==='boom'){ pCol[o4]=1;pCol[o4+1]=0.35+0.4*t;pCol[o4+2]=0.08;pCol[o4+3]=t; }
    else if(q.kind==='puff'){ pCol[o4]=0.9;pCol[o4+1]=0.9;pCol[o4+2]=0.95;pCol[o4+3]=t*0.8; }
    else if(q.kind==='spark'){ pCol[o4]=0.5;pCol[o4+1]=0.85;pCol[o4+2]=1.0;pCol[o4+3]=t; }
    else if(q.kind==='dust'){ pCol[o4]=0.55;pCol[o4+1]=0.5;pCol[o4+2]=0.4;pCol[o4+3]=t*0.7; }
    else { pCol[o4]=1;pCol[o4+1]=0.6+0.35*t;pCol[o4+2]=0.2*t;pCol[o4+3]=t*0.9; } }
  gl.bindBuffer(gl.ARRAY_BUFFER,pPosBuf); gl.bufferData(gl.ARRAY_BUFFER,pPos.subarray(0,n*3),gl.DYNAMIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,pColBuf); gl.bufferData(gl.ARRAY_BUFFER,pCol.subarray(0,n*4),gl.DYNAMIC_DRAW);
  gl.useProgram(flatProg); gl.uniformMatrix4fv(flatU.uMVP,false,pv); gl.uniform1f(flatU.uSize,22.0); gl.uniform1f(flatU.uRound,1.0);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE); gl.depthMask(false);
  gl.enableVertexAttribArray(flatU.aPos); gl.bindBuffer(gl.ARRAY_BUFFER,pPosBuf); gl.vertexAttribPointer(flatU.aPos,3,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(flatU.aColor); gl.bindBuffer(gl.ARRAY_BUFFER,pColBuf); gl.vertexAttribPointer(flatU.aColor,4,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.POINTS,0,n); gl.depthMask(true); gl.disable(gl.BLEND); }

/* ---------- HUD ---------- */
const elAlt=document.getElementById('alt'),elSpd=document.getElementById('spd'),elBest=document.getElementById('bestalt'),
      elBar1=document.getElementById('fbar1'),elBar2=document.getElementById('fbar2'),elFp1=document.getElementById('fp1'),elFp2=document.getElementById('fp2'),
      elRow1=document.getElementById('frow1'),elRow2=document.getElementById('frow2'),
      elChip=document.getElementById('stagechip'),tctx=document.getElementById('tctx'),tctxlbl=document.getElementById('tctxlbl');
function fmtAlt(u){ const m=(u-1)*ALT_SCALE; return m>=1000?(m/1000).toFixed(1)+' km':Math.max(0,Math.round(m))+' m'; }
function hud(){ const s=state;
  elAlt.textContent=fmtAlt(s.pos[1]);
  elSpd.textContent=Math.round(len(s.vel)*ALT_SCALE/10)+' m/s';
  elBest.textContent=fmtAlt(bestUnits);
  const f1=Math.round(s.fuel1/STG[1].fuel*100), f2=Math.round(s.fuel2/STG[2].fuel*100);
  elBar1.style.width=f1+'%'; elFp1.textContent=f1+'%'; elBar2.style.width=f2+'%'; elFp2.textContent=f2+'%';
  elRow1.classList.toggle('inactive', s.stage!==1); elRow2.classList.toggle('inactive', s.stage!==2);
  let chip = s.deployed?'위성 배치 완료 🛰':(s.stage===1?'1단 · 하이브리드 엔진':(s.reachedSpace?'우주 · 위성배치 대기':'2단 점화'));
  if(hintTimer>0) chip=hintText;
  elChip.textContent=chip;
  // 터치 컨텍스트 버튼 라벨
  if(s.reachedSpace && !s.deployed){ tctx.style.display='flex'; tctxlbl.textContent='위성배치'; }
  else if(s.started && s.stage===1 && !s.crashed){ tctx.style.display='flex'; tctxlbl.textContent='단분리'; }
  else tctx.style.display='none';
}

/* ---------- 미니맵 (측면 궤적: 고도 + 좌우 드리프트) ---------- */
const mm=document.getElementById('minimap'), mctx=mm.getContext('2d');
const MM_W=mm.width, MM_H=mm.height, MM_MAXKM=120;
function altKmOf(u){ return (u-1)*ALT_SCALE/1000; }
function mmAltY(km){ const y0=MM_H-16, y1=14; return y0+(y1-y0)*clamp(km/MM_MAXKM,0,1); }
function mmX(px){ return MM_W/2 + clamp(px/7, -(MM_W/2-16), MM_W/2-16); }
function drawMinimap(){ const s=state, c=mctx;
  c.clearRect(0,0,MM_W,MM_H);
  c.fillStyle='rgba(6,12,22,0.60)'; c.beginPath(); c.roundRect(0,0,MM_W,MM_H,10); c.fill();
  c.strokeStyle='rgba(255,255,255,0.10)'; c.lineWidth=1; c.stroke();
  // 제목
  c.fillStyle='rgba(180,210,240,0.65)'; c.font='700 10px sans-serif'; c.textAlign='left'; c.fillText('궤적 · MINI MAP', 9, 15);
  // 고도 눈금
  c.textAlign='right'; c.font='9px sans-serif';
  for(let km=0;km<=MM_MAXKM;km+=30){ const y=mmAltY(km); c.strokeStyle='rgba(255,255,255,0.07)'; c.beginPath(); c.moveTo(10,y); c.lineTo(MM_W-10,y); c.stroke();
    c.fillStyle='rgba(150,175,205,0.55)'; c.fillText(km+'km', MM_W-8, y-2); }
  // 바다/육지 (하단)
  const yg=mmAltY(0);
  c.fillStyle='#0e4b6b'; c.fillRect(8,yg,MM_W-16,MM_H-yg-6);            // 바다
  c.fillStyle='#2b5a24'; c.fillRect(MM_W/2-26,yg,52,MM_H-yg-6);        // 육지(발사장)
  c.fillStyle='#a8975f'; c.fillRect(MM_W/2-26,yg,52,2);                // 해안선
  // 카르만 라인
  const yk=mmAltY(100); c.strokeStyle='rgba(120,200,255,0.75)'; c.setLineDash([4,3]); c.beginPath(); c.moveTo(10,yk); c.lineTo(MM_W-10,yk); c.stroke(); c.setLineDash([]);
  c.fillStyle='rgba(150,210,255,0.9)'; c.textAlign='left'; c.font='700 9px sans-serif'; c.fillText('카르만 100km', 12, yk-3);
  // 방해물 (붉은 마름모)
  for(const o of OBSTACLES){ const ox=mmX(o.x), oy=mmAltY(altKmOf(o.y));
    c.fillStyle='#ff5a4a'; c.save(); c.translate(ox,oy); c.rotate(Math.PI/4); c.fillRect(-2.6,-2.6,5.2,5.2); c.restore(); }
  // 낙하하는 1단
  if(s.jettison){ const jx=mmX(s.jettison.pos[0]), jy=mmAltY(altKmOf(s.jettison.pos[1])); c.fillStyle='rgba(150,160,175,0.85)'; c.fillRect(jx-2,jy-2,4,4); }
  // 위성
  if(s.satellite){ const px=mmX(s.satellite.p[0]), py=mmAltY(altKmOf(s.satellite.p[1])); c.fillStyle='#6fd3ff'; c.beginPath(); c.arc(px,py,3.5,0,TAU); c.fill(); }
  // 로켓 (현재 위치)
  if(!s.crashed){ const rx=mmX(s.pos[0]), ry=mmAltY(altKmOf(s.pos[1]));
    c.fillStyle = s.stage===1 ? '#ffd24a' : '#ff7a3c';
    c.save(); c.translate(rx,ry); c.beginPath(); c.moveTo(0,-6); c.lineTo(4,4); c.lineTo(-4,4); c.closePath(); c.fill(); c.restore();
    c.strokeStyle='rgba(255,255,255,0.5)'; c.lineWidth=1; c.beginPath(); c.moveTo(rx,ry+4); c.lineTo(rx,yg); c.stroke();
  } else { c.fillStyle='#ff5544'; c.textAlign='center'; c.font='700 11px sans-serif'; c.fillText('✕', mmX(s.pos[0]), mmAltY(altKmOf(bestUnits))); }
}

/* ---------- 리사이즈 & 루프 ---------- */
function resize(){ const dpr=Math.min(window.devicePixelRatio||1,2); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); gl.viewport(0,0,canvas.width,canvas.height); }
addEventListener('resize',resize); resize();
reset();
let last=performance.now();
function frame(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05); update(dt); render(); hud(); drawMinimap(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
</script>
</body>
