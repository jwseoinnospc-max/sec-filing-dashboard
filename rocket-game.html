<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>🚀 로켓 발사 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; }
  #glcanvas { display: block; width: 100vw; height: 100vh; }

  .hud { position: fixed; color: #eaf2ff; text-shadow: 0 1px 3px rgba(0,0,0,.7); pointer-events: none; z-index: 10; }
  #stats { top: 14px; left: 14px; font-variant-numeric: tabular-nums; }
  #stats .big { font-size: 30px; font-weight: 700; letter-spacing: .5px; }
  #stats .lbl { font-size: 11px; opacity: .65; letter-spacing: 1px; text-transform: uppercase; }
  #stats .row { margin-bottom: 10px; }
  #stats .val { font-size: 16px; font-weight: 600; }

  #best { top: 14px; right: 14px; text-align: right; }
  #best .lbl { font-size: 11px; opacity: .65; letter-spacing: 1px; }
  #best .val { font-size: 18px; font-weight: 700; }

  #fuelwrap { bottom: 24px; left: 50%; transform: translateX(-50%); width: min(340px, 80vw); }
  #fuelwrap .lbl { font-size: 11px; opacity: .8; margin-bottom: 4px; display:flex; justify-content: space-between; }
  #fueltrack { height: 12px; border-radius: 6px; background: rgba(255,255,255,.12); overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,.15); }
  #fuelbar { height: 100%; width: 100%; border-radius: 6px; background: linear-gradient(90deg,#ff5a3c,#ffb03a,#ffe66d); transition: width .08s linear; }

  #msg { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; width: 92%; }
  #msg h1 { font-size: clamp(26px, 7vw, 52px); font-weight: 800; letter-spacing: 1px; }
  #msg p  { margin-top: 10px; font-size: clamp(13px, 3.4vw, 17px); opacity: .85; line-height: 1.6; }
  #msg .key { display:inline-block; padding: 2px 9px; margin: 0 2px; border-radius: 6px; background: rgba(255,255,255,.15); font-weight: 700; font-size: .9em; }

  /* touch controls */
  #touch { position: fixed; inset: 0; z-index: 9; display: none; }
  .tbtn { position: fixed; bottom: 60px; width: 78px; height: 78px; border-radius: 50%; background: rgba(255,255,255,.10); border: 2px solid rgba(255,255,255,.25); color:#fff; font-size: 30px; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color: transparent; }
  .tbtn:active { background: rgba(255,255,255,.28); }
  #tleft { left: 22px; }
  #tright { left: 116px; }
  #tthrust { right: 22px; width: 96px; height: 96px; bottom: 52px; font-size: 34px; background: rgba(255,120,60,.22); border-color: rgba(255,150,90,.5); }
  #hint { bottom: 6px; left: 0; right: 0; text-align:center; font-size: 12px; opacity:.5; }
  @media (hover: none) and (pointer: coarse) { #touch { display: block; } #hint{ display:none; } }
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>

<div class="hud" id="stats">
  <div class="row"><div class="lbl">고도</div><div class="big" id="alt">0 m</div></div>
  <div class="row"><div class="lbl">속도</div><div class="val" id="spd">0 m/s</div></div>
</div>
<div class="hud" id="best">
  <div class="lbl">최고 고도</div><div class="val" id="bestalt">0 m</div>
</div>
<div class="hud" id="fuelwrap">
  <div class="lbl"><span>연료</span><span id="fueltxt">100%</span></div>
  <div id="fueltrack"><div id="fuelbar"></div></div>
</div>
<div class="hud" id="msg">
  <h1>🚀 로켓 발사</h1>
  <p><span class="key">Space</span> 추진 · <span class="key">← →</span> 방향 조종<br>연료를 아껴 <b>카르만 라인(100km)</b>까지 도달하세요<br><br><b>아무 키나 눌러 시작</b></p>
</div>

<div id="touch">
  <div class="tbtn" id="tleft">◀</div>
  <div class="tbtn" id="tright">▶</div>
  <div class="tbtn" id="tthrust">🔥</div>
</div>
<div class="hud" id="hint">Space: 추진 · ←/→: 조종 · R: 재시작</div>

<script>
"use strict";
/* ============================================================
   순수 WebGL 3D 로켓 발사 게임 — 외부 의존성 없음
   ============================================================ */
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:20px">이 브라우저는 WebGL을 지원하지 않습니다.</p>'; throw new Error('no webgl'); }

/* ---------- mat4 / vec3 헬퍼 (column-major) ---------- */
const M = {
  mul(a, b) {
    const o = new Float32Array(16);
    for (let c = 0; c < 4; c++) for (let r = 0; r < 4; r++) {
      let s = 0; for (let k = 0; k < 4; k++) s += a[k*4+r] * b[c*4+k];
      o[c*4+r] = s;
    }
    return o;
  },
  perspective(fovy, aspect, near, far) {
    const f = 1 / Math.tan(fovy/2), nf = 1/(near-far), o = new Float32Array(16);
    o[0]=f/aspect; o[5]=f; o[10]=(far+near)*nf; o[11]=-1; o[14]=2*far*near*nf; return o;
  },
  lookAt(eye, ctr, up) {
    const z = norm(sub(eye, ctr));
    const x = norm(cross(up, z));
    const y = cross(z, x);
    return new Float32Array([
      x[0], y[0], z[0], 0,
      x[1], y[1], z[1], 0,
      x[2], y[2], z[2], 0,
      -dot(x,eye), -dot(y,eye), -dot(z,eye), 1
    ]);
  },
  translation(x,y,z){ const o=ident(); o[12]=x;o[13]=y;o[14]=z; return o; },
  rotY(a){ const c=Math.cos(a),s=Math.sin(a),o=ident(); o[0]=c;o[2]=-s;o[8]=s;o[10]=c; return o; },
  rotZ(a){ const c=Math.cos(a),s=Math.sin(a),o=ident(); o[0]=c;o[1]=s;o[4]=-s;o[5]=c; return o; },
};
function ident(){ const o=new Float32Array(16); o[0]=o[5]=o[10]=o[15]=1; return o; }
function sub(a,b){ return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]; }
function add(a,b){ return [a[0]+b[0],a[1]+b[1],a[2]+b[2]]; }
function scaleV(a,s){ return [a[0]*s,a[1]*s,a[2]*s]; }
function dot(a,b){ return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function cross(a,b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function len(a){ return Math.hypot(a[0],a[1],a[2]); }
function norm(a){ const l=len(a)||1; return [a[0]/l,a[1]/l,a[2]/l]; }
function normalMat3(m){ return new Float32Array([m[0],m[1],m[2], m[4],m[5],m[6], m[8],m[9],m[10]]); }
function mix(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

/* ---------- 셰이더 ---------- */
function compile(type, src) {
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

const litProg = program(`
  attribute vec3 aPos; attribute vec3 aNormal; attribute vec3 aColor;
  uniform mat4 uMVP; uniform mat3 uNMat;
  varying vec3 vColor; varying vec3 vN;
  void main(){ gl_Position = uMVP * vec4(aPos,1.0); vN = normalize(uNMat*aNormal); vColor = aColor; }
`, `
  precision mediump float;
  varying vec3 vColor; varying vec3 vN; uniform vec3 uLight;
  void main(){
    float d = max(dot(normalize(vN), normalize(uLight)), 0.0);
    float l = 0.32 + 0.68*d;
    gl_FragColor = vec4(vColor*l, 1.0);
  }
`);
const flatProg = program(`
  attribute vec3 aPos; attribute vec4 aColor;
  uniform mat4 uMVP; uniform float uSize;
  varying vec4 vColor;
  void main(){ gl_Position = uMVP*vec4(aPos,1.0); gl_PointSize = uSize; vColor = aColor; }
`, `
  precision mediump float;
  varying vec4 vColor; uniform float uRound;
  void main(){
    if (uRound > 0.5){ vec2 c = gl_PointCoord - vec2(0.5); if (dot(c,c) > 0.25) discard; }
    gl_FragColor = vColor;
  }
`);
const litU = {
  uMVP: gl.getUniformLocation(litProg,'uMVP'),
  uNMat: gl.getUniformLocation(litProg,'uNMat'),
  uLight: gl.getUniformLocation(litProg,'uLight'),
  aPos: gl.getAttribLocation(litProg,'aPos'),
  aNormal: gl.getAttribLocation(litProg,'aNormal'),
  aColor: gl.getAttribLocation(litProg,'aColor'),
};
const flatU = {
  uMVP: gl.getUniformLocation(flatProg,'uMVP'),
  uSize: gl.getUniformLocation(flatProg,'uSize'),
  uRound: gl.getUniformLocation(flatProg,'uRound'),
  aPos: gl.getAttribLocation(flatProg,'aPos'),
  aColor: gl.getAttribLocation(flatProg,'aColor'),
};

/* ---------- 지오메트리 빌더 (position, normal, color) ---------- */
function MeshBuilder() {
  const pos=[], nrm=[], col=[];
  return {
    triN(a,na, b,nb, c,nc, color){
      pos.push(a[0],a[1],a[2], b[0],b[1],b[2], c[0],c[1],c[2]);
      nrm.push(na[0],na[1],na[2], nb[0],nb[1],nb[2], nc[0],nc[1],nc[2]);
      for (let i=0;i<3;i++) col.push(color[0],color[1],color[2]);
    },
    triFlat(a,b,c, color){ const n = norm(cross(sub(b,a), sub(c,a))); this.triN(a,n,b,n,c,n,color); },
    quadFlat(a,b,c,d, color){ this.triFlat(a,b,c,color); this.triFlat(a,c,d,color); },
    cylinder(r, y0, y1, seg, color){
      for (let i=0;i<seg;i++){
        const t0=i/seg*Math.PI*2, t1=(i+1)/seg*Math.PI*2;
        const c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1);
        const p00=[r*c0,y0,r*s0], p01=[r*c0,y1,r*s0], p10=[r*c1,y0,r*s1], p11=[r*c1,y1,r*s1];
        const n0=[c0,0,s0], n1=[c1,0,s1];
        this.triN(p00,n0,p10,n1,p11,n1,color);
        this.triN(p00,n0,p11,n1,p01,n0,color);
      }
    },
    cone(rBot, y0, y1, seg, color){ // apex at y1, base radius rBot at y0
      const h = y1-y0, slope = rBot/Math.hypot(rBot,h);
      const ny = rBot/Math.hypot(rBot,h) * 0 + h/Math.hypot(rBot,h); // vertical comp of normal
      for (let i=0;i<seg;i++){
        const t0=i/seg*Math.PI*2, t1=(i+1)/seg*Math.PI*2, tm=(t0+t1)/2;
        const c0=Math.cos(t0),s0=Math.sin(t0),c1=Math.cos(t1),s1=Math.sin(t1),cm=Math.cos(tm),sm=Math.sin(tm);
        const b0=[rBot*c0,y0,rBot*s0], b1=[rBot*c1,y0,rBot*s1], apex=[0,y1,0];
        const nb0=norm([slope*c0, ny, slope*s0]);
        const nb1=norm([slope*c1, ny, slope*s1]);
        const na =norm([slope*cm, ny, slope*sm]);
        this.triN(b0,nb0, b1,nb1, apex,na, color);
      }
    },
    box(cx,cy,cz, sx,sy,sz, color){
      const x0=cx-sx/2,x1=cx+sx/2,y0=cy-sy/2,y1=cy+sy/2,z0=cz-sz/2,z1=cz+sz/2;
      const V=[[x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1],[x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]];
      this.quadFlat(V[4],V[5],V[6],V[7],color); // top
      this.quadFlat(V[3],V[2],V[1],V[0],color); // bottom
      this.quadFlat(V[0],V[1],V[5],V[4],color); // front
      this.quadFlat(V[2],V[3],V[7],V[6],color); // back
      this.quadFlat(V[1],V[2],V[6],V[5],color); // right
      this.quadFlat(V[3],V[0],V[4],V[7],color); // left
    },
    build(){ return { pos:new Float32Array(pos), nrm:new Float32Array(nrm), col:new Float32Array(col), count: pos.length/3 }; }
  };
}
function makeGLMesh(data){
  const b = { pos: gl.createBuffer(), nrm: gl.createBuffer(), col: gl.createBuffer(), count: data.count };
  gl.bindBuffer(gl.ARRAY_BUFFER,b.pos); gl.bufferData(gl.ARRAY_BUFFER,data.pos,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,b.nrm); gl.bufferData(gl.ARRAY_BUFFER,data.nrm,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,b.col); gl.bufferData(gl.ARRAY_BUFFER,data.col,gl.STATIC_DRAW);
  return b;
}
function drawLit(mesh, model){
  const mvp = M.mul(pv, model);
  gl.useProgram(litProg);
  gl.uniformMatrix4fv(litU.uMVP,false,mvp);
  gl.uniformMatrix3fv(litU.uNMat,false,normalMat3(model));
  gl.uniform3fv(litU.uLight, LIGHT);
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.pos); gl.enableVertexAttribArray(litU.aPos); gl.vertexAttribPointer(litU.aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.nrm); gl.enableVertexAttribArray(litU.aNormal); gl.vertexAttribPointer(litU.aNormal,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.col); gl.enableVertexAttribArray(litU.aColor); gl.vertexAttribPointer(litU.aColor,3,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLES,0,mesh.count);
}

/* ---------- 로켓 메쉬 ---------- */
const WHITE=[0.90,0.91,0.94], RED=[0.86,0.16,0.16], DARK=[0.24,0.25,0.30], BLUE=[0.35,0.6,0.95];
const R=1.2;
const rb = MeshBuilder();
rb.cone(R*0.9, 0.0, -1.4, 20, DARK);      // nozzle (아래로)
rb.cylinder(R, 0.0, 6.2, 24, WHITE);       // body
rb.cylinder(R*1.02, 3.4, 4.0, 24, BLUE);   // window band
rb.cone(R, 6.2, 9.6, 24, RED);             // nose cone
// fins x4
for (let k=0;k<4;k++){
  const a = k/4*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
  const inn=[R*ca,0.2,R*sa], base=[R*ca,2.6,R*sa], out=[(R+2.0)*ca,-0.2,(R+2.0)*sa];
  const nrm1 = norm(cross(sub(base,inn),sub(out,inn)));
  rb.triN(inn,nrm1,base,nrm1,out,nrm1,RED);
  rb.triN(inn,scaleV(nrm1,-1),out,scaleV(nrm1,-1),base,scaleV(nrm1,-1),RED);
}
const rocketMesh = makeGLMesh(rb.build());

/* ---------- 지형 / 발사대 ---------- */
const gb = MeshBuilder();
gb.box(0,-1,0, 1600,2,1600, [0.10,0.13,0.11]);       // ground slab
gb.box(0,0,0, 14,2,14, [0.30,0.31,0.36]);            // pad base
gb.box(0,1.2,0, 9,0.5,9, [0.42,0.43,0.48]);          // pad top
// launch tower
gb.box(7,7,0, 1,16,1, [0.33,0.34,0.4]);
gb.box(7,15,-2, 1,1,5, [0.33,0.34,0.4]);
const groundMesh = makeGLMesh(gb.build());

/* ---------- 격자 라인 ---------- */
const gridPos=[], gridCol=[];
const G=800, step=25;
for (let i=-G;i<=G;i+=step){
  gridPos.push(i,0.05,-G, i,0.05,G, -G,0.05,i, G,0.05,i);
  for (let j=0;j<4;j++) gridCol.push(0.22,0.28,0.34,0.5);
}
const gridBuf = { pos: gl.createBuffer(), col: gl.createBuffer(), count: gridPos.length/3 };
gl.bindBuffer(gl.ARRAY_BUFFER,gridBuf.pos); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(gridPos),gl.STATIC_DRAW);
gl.bindBuffer(gl.ARRAY_BUFFER,gridBuf.col); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(gridCol),gl.STATIC_DRAW);

/* ---------- 별 ---------- */
const starPos=[], starCol=[], NSTARS=900;
for (let i=0;i<NSTARS;i++){
  const th=Math.random()*Math.PI*2, ph=Math.acos(Math.random()*2-1), r=1400+Math.random()*400;
  const x=r*Math.sin(ph)*Math.cos(th), y=Math.abs(r*Math.cos(ph))*0.9+50, z=r*Math.sin(ph)*Math.sin(th);
  starPos.push(x,y,z);
  const b=0.6+Math.random()*0.4; starCol.push(b,b,b, 1.0);
}
const starBuf = { pos: gl.createBuffer(), col: gl.createBuffer(), count: NSTARS };
gl.bindBuffer(gl.ARRAY_BUFFER,starBuf.pos); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(starPos),gl.STATIC_DRAW);
gl.bindBuffer(gl.ARRAY_BUFFER,starBuf.col); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(starCol),gl.STATIC_DRAW);

/* ---------- 배기 파티클 ---------- */
const MAXP = 400;
const pPos = new Float32Array(MAXP*3), pCol = new Float32Array(MAXP*4);
const parts = []; // {p:[x,y,z], v:[..], life, max}
const pPosBuf = gl.createBuffer(), pColBuf = gl.createBuffer();

/* ---------- 게임 상태 ---------- */
const GRAV=9.8, THRUST=27, FUEL_MAX=100, BURN=6.8, MAX_TILT=0.62, ALT_SCALE=110, SPACE_UNITS=909;
let state, keys={}, bestUnits=0;

function reset(){
  state = {
    pos: [0, 1.0, 0], vel: [0,0,0],
    tilt: 0, yaw: 0,
    fuel: FUEL_MAX,
    started: false, crashed: false, reachedSpace: false, landed: false,
    cam: [0, 12, 42],
    t: 0,
  };
  parts.length = 0;
}
reset();

/* ---------- 입력 ---------- */
const T = { left:false, right:false, thrust:false };
function begin(){ if(!state.started && !state.crashed){ state.started = true; hide(msg);} }
addEventListener('keydown', e=>{
  if (e.repeat) return;
  const k=e.key.toLowerCase();
  if (k===' '||k==='arrowup'||k==='w'){ keys.thrust=true; begin(); e.preventDefault(); }
  if (k==='arrowleft'||k==='a'){ keys.left=true; begin(); }
  if (k==='arrowright'||k==='d'){ keys.right=true; begin(); }
  if (k==='r'){ reset(); show(msgReset()); }
});
addEventListener('keyup', e=>{
  const k=e.key.toLowerCase();
  if (k===' '||k==='arrowup'||k==='w') keys.thrust=false;
  if (k==='arrowleft'||k==='a') keys.left=false;
  if (k==='arrowright'||k==='d') keys.right=false;
});
function bindTouch(el,prop){
  el.addEventListener('touchstart',e=>{e.preventDefault(); T[prop]=true; begin();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault(); T[prop]=false;},{passive:false});
  el.addEventListener('touchcancel',e=>{T[prop]=false;});
}
bindTouch(document.getElementById('tleft'),'left');
bindTouch(document.getElementById('tright'),'right');
bindTouch(document.getElementById('tthrust'),'thrust');

const msg = document.getElementById('msg');
function hide(el){ el.style.display='none'; }
function show(html){ msg.innerHTML=html; msg.style.display='block'; }
function msgReset(){ return '<h1>🚀 로켓 발사</h1><p><span class="key">Space</span> 추진 · <span class="key">← →</span> 방향 조종<br>연료를 아껴 <b>카르만 라인(100km)</b>까지<br><br><b>아무 키나 눌러 시작</b></p>'; }

/* ---------- 물리 업데이트 ---------- */
function update(dt){
  const s = state;
  s.t += dt;
  const left = keys.left || T.left, right = keys.right || T.right;
  const wantThrust = (keys.thrust || T.thrust) && s.fuel > 0 && !s.crashed;

  if (s.started && !s.crashed){
    // 조종 (틸트)
    if (left)  s.tilt = clamp(s.tilt + 1.6*dt,  -MAX_TILT, MAX_TILT);
    if (right) s.tilt = clamp(s.tilt - 1.6*dt,  -MAX_TILT, MAX_TILT);
    if (!left && !right) s.tilt *= (1 - Math.min(1, 2.2*dt)); // 자동 복귀

    // 로켓 로컬 up 벡터 (틸트 = Z축 회전)
    const up = [ -Math.sin(s.tilt), Math.cos(s.tilt), 0 ];

    // 가속도
    let ax=0, ay=-GRAV, az=0;
    if (wantThrust){
      ax += up[0]*THRUST; ay += up[1]*THRUST; az += up[2]*THRUST;
      s.fuel = Math.max(0, s.fuel - BURN*dt);
      spawnExhaust(s, up, dt);
    }
    // 공기저항
    const v=s.vel; const drag=0.02;
    ax -= v[0]*drag; ay -= v[1]*drag; az -= v[2]*drag;

    v[0]+=ax*dt; v[1]+=ay*dt; v[2]+=az*dt;
    s.pos[0]+=v[0]*dt; s.pos[1]+=v[1]*dt; s.pos[2]+=v[2]*dt;

    // 지면 처리
    if (s.pos[1] <= 1.0){
      s.pos[1] = 1.0;
      const impact = len(v);
      const wasFlying = s.t > 0.4;
      if (wasFlying && impact > 16){
        crash(s);
      } else {
        v[0]=v[1]=v[2]=0;
        if (wasFlying && !s.reachedSpace) s.landed = true;
      }
    }
    // 우주 도달
    if (!s.reachedSpace && s.pos[1] >= SPACE_UNITS){
      s.reachedSpace = true;
      show('<h1>🌌 우주 도달!</h1><p>카르만 라인(100km)을 돌파했습니다 🎉<br>계속 비행하거나 <span class="key">R</span> 로 재시작</p>');
    }
    if (s.pos[1] > bestUnits) bestUnits = s.pos[1];
  }
  updateExhaust(dt);

  // 카메라 추적 (부드럽게)
  const target = [ s.pos[0], s.pos[1] + 12, s.pos[2] + 42 ];
  const k = 1 - Math.pow(0.0001, dt);
  s.cam[0]=mix(s.cam[0],target[0],k); s.cam[1]=mix(s.cam[1],target[1],k); s.cam[2]=mix(s.cam[2],target[2],k);
}

function crash(s){
  s.crashed = true;
  for (let i=0;i<60;i++){
    parts.push({ p:[s.pos[0], s.pos[1]+1, s.pos[2]],
      v:[(Math.random()-0.5)*30,(Math.random())*24,(Math.random()-0.5)*30], life:1.2, max:1.2, boom:true });
  }
  show('<h1>💥 충돌!</h1><p>최고 고도 <b>'+fmtAlt(bestUnits)+'</b><br><span class="key">R</span> 키로 재시작</p>');
}

function spawnExhaust(s, up, dt){
  const nozzle = [ s.pos[0]-up[0]*1.4, s.pos[1]-up[1]*1.4, s.pos[2]-up[2]*1.4 ];
  const n = Math.min(8, Math.floor(60*dt)+2);
  for (let i=0;i<n;i++){
    if (parts.length>=MAXP) break;
    const spread=1.2;
    parts.push({
      p:[nozzle[0]+(Math.random()-0.5)*spread, nozzle[1], nozzle[2]+(Math.random()-0.5)*spread],
      v:[ -up[0]*24 + (Math.random()-0.5)*8, -up[1]*24 + (Math.random()-0.5)*6, -up[2]*24 + (Math.random()-0.5)*8 ],
      life:0.55, max:0.55, boom:false
    });
  }
}
function updateExhaust(dt){
  for (let i=parts.length-1;i>=0;i--){
    const q=parts[i]; q.life-=dt;
    if (q.life<=0){ parts.splice(i,1); continue; }
    q.p[0]+=q.v[0]*dt; q.p[1]+=q.v[1]*dt; q.p[2]+=q.v[2]*dt;
    if (q.boom){ q.v[1]-=30*dt; }
  }
}

/* ---------- 렌더 ---------- */
const LIGHT = norm([0.4, 0.9, 0.35]);
let pv;
function render(){
  const s = state, alt01 = clamp(s.pos[1]/SPACE_UNITS, 0, 1);
  // 하늘색: 지상 파랑 → 우주 검정
  const sky = [ mix(0.42,0.02,alt01), mix(0.62,0.02,alt01), mix(0.85,0.05,alt01) ];
  gl.clearColor(sky[0],sky[1],sky[2],1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const proj = M.perspective(Math.PI/3.2, canvas.width/canvas.height, 0.5, 5000);
  const view = M.lookAt(s.cam, [s.pos[0], s.pos[1]+4, s.pos[2]], [0,1,0]);
  pv = M.mul(proj, view);

  // 별 (높이 올라갈수록 진하게)
  const starAlpha = alt01;
  if (starAlpha > 0.02) drawFlat(starBuf, gl.POINTS, 2.0, 1.0, starAlpha);

  // 지형/발사대/로켓
  gl.disable(gl.BLEND);
  drawLit(groundMesh, ident());
  drawFlat(gridBuf, gl.LINES, 1.0, 0.0, 1.0 - alt01*0.8);
  if (!s.crashed){
    const model = M.mul(M.translation(s.pos[0],s.pos[1],s.pos[2]), M.mul(M.rotY(s.yaw), M.rotZ(s.tilt)));
    drawLit(rocketMesh, model);
  }

  // 배기/폭발 파티클 (가산 혼합)
  drawParticles(s);
}

function drawFlat(buf, mode, size, round, alphaMul){
  gl.useProgram(flatProg);
  gl.uniformMatrix4fv(flatU.uMVP,false,pv);
  gl.uniform1f(flatU.uSize,size);
  gl.uniform1f(flatU.uRound,round);
  if (alphaMul < 1){ gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA); }
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.pos); gl.enableVertexAttribArray(flatU.aPos); gl.vertexAttribPointer(flatU.aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf.col); gl.enableVertexAttribArray(flatU.aColor); gl.vertexAttribPointer(flatU.aColor,4,gl.FLOAT,false,0,0);
  gl.drawArrays(mode,0,buf.count);
  gl.disable(gl.BLEND);
}
function drawParticles(s){
  const n = parts.length;
  if (!n) return;
  for (let i=0;i<n;i++){
    const q=parts[i], t=q.life/q.max, o=i*3, o4=i*4;
    pPos[o]=q.p[0]; pPos[o+1]=q.p[1]; pPos[o+2]=q.p[2];
    if (q.boom){ pCol[o4]=1.0; pCol[o4+1]=0.4+0.4*t; pCol[o4+2]=0.1; pCol[o4+3]=t; }
    else { pCol[o4]=1.0; pCol[o4+1]=0.55+0.4*t; pCol[o4+2]=0.15*t; pCol[o4+3]=t*0.9; }
  }
  gl.bindBuffer(gl.ARRAY_BUFFER,pPosBuf); gl.bufferData(gl.ARRAY_BUFFER,pPos.subarray(0,n*3),gl.DYNAMIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,pColBuf); gl.bufferData(gl.ARRAY_BUFFER,pCol.subarray(0,n*4),gl.DYNAMIC_DRAW);
  gl.useProgram(flatProg);
  gl.uniformMatrix4fv(flatU.uMVP,false,pv);
  gl.uniform1f(flatU.uSize, 22.0);
  gl.uniform1f(flatU.uRound, 1.0);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE); gl.depthMask(false);
  gl.enableVertexAttribArray(flatU.aPos); gl.bindBuffer(gl.ARRAY_BUFFER,pPosBuf); gl.vertexAttribPointer(flatU.aPos,3,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(flatU.aColor); gl.bindBuffer(gl.ARRAY_BUFFER,pColBuf); gl.vertexAttribPointer(flatU.aColor,4,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.POINTS,0,n);
  gl.depthMask(true); gl.disable(gl.BLEND);
}

/* ---------- HUD ---------- */
const elAlt=document.getElementById('alt'), elSpd=document.getElementById('spd'),
      elBest=document.getElementById('bestalt'), elFuelBar=document.getElementById('fuelbar'),
      elFuelTxt=document.getElementById('fueltxt');
function fmtAlt(u){ const m=(u-1)*ALT_SCALE; return m>=1000 ? (m/1000).toFixed(1)+' km' : Math.max(0,Math.round(m))+' m'; }
function hud(){
  const s=state;
  elAlt.textContent = fmtAlt(s.pos[1]);
  elSpd.textContent = Math.round(len(s.vel)*ALT_SCALE/10) + ' m/s';
  elBest.textContent = fmtAlt(bestUnits);
  const f = Math.round(s.fuel);
  elFuelBar.style.width = f+'%';
  elFuelTxt.textContent = f+'%';
}

/* ---------- 리사이즈 ---------- */
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = Math.floor(innerWidth*dpr);
  canvas.height = Math.floor(innerHeight*dpr);
  gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener('resize', resize); resize();

/* ---------- 메인 루프 ---------- */
let last = performance.now();
function frame(now){
  let dt = (now-last)/1000; last=now;
  dt = Math.min(dt, 0.05);
  update(dt);
  render();
  hud();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
